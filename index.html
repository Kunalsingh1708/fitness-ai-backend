<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness Generator</title>
    <style>
        /* THE PAINT (CSS) - Upgraded for modern aesthetics */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e2e8f0; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 900px; }
        h2 { text-align: center; color: #1e293b; margin-top: 0; font-size: 28px; }
        label { font-weight: bold; color: #475569; display: block; margin-top: 15px; font-size: 14px;}
        input, select, button { width: 100%; padding: 12px 15px; margin-top: 8px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 16px; background-color: #f8fafc; transition: 0.2s;}
        input:focus, select:focus { outline: none; border-color: #3b82f6; background-color: white; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        button { background-color: #10b981; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; font-size: 18px; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        button:hover { background-color: #059669; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(16, 185, 129, 0.3); }
        
        /* --- AESTHETIC UI ELEMENTS --- */
        #loading { text-align: center; font-size: 18px; color: #64748b; display: none; margin-top: 30px; font-weight: 500; }
        #result-box { display: none; margin-top: 40px; border-top: 2px dashed #e2e8f0; padding-top: 30px; }
        .success-title { text-align: center; color: #10b981; margin-bottom: 25px; font-size: 24px; }
        
        /* The 2x2 Grid Layout */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 700px) { .grid-container { grid-template-columns: 1fr; } } 
        
        /* Individual Week Cards */
        .week-card { background: #f8fafc; border-left: 6px solid #3b82f6; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .week-card h3 { margin-top: 0; color: #1e293b; text-transform: capitalize; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; font-size: 20px; }
        .week-card ul { padding-left: 20px; margin-bottom: 0; }
        .week-card li { margin-bottom: 10px; line-height: 1.6; color: #334155; }
        .week-card strong { color: #0f172a; }
    </style>
</head>
<body>

    <div class="card">
        <h2>⚡ AI Workout Generator</h2>
        
        <label>Your Name:</label>
        <input type="text" id="userName" placeholder="e.g., Kunal">
        
        <label>Fitness Level:</label>
        <select id="userLevel">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
        </select>
        
        <label>Available Equipment:</label>
        <input type="text" id="userEquipment" placeholder="e.g., Dumbbells and a bench, or None">
        
        <label>Injuries or Limitations:</label>
        <input type="text" id="userInjuries" placeholder="e.g., Bad left knee, or None">
        
        <button onclick="sendOrderToManager()">Generate My Custom Plan</button>

        <div id="loading">🤖 AI is analyzing your profile... This takes about 5 seconds...</div>
        <div id="result-box"></div>
    </div>

   <script>
        // THE ULTIMATE UNBOXER: This function relentlessly digs through nested arrays/objects
        function extractText(data) {
            if (typeof data === 'string') return data; // Found text!
            if (typeof data === 'number') return data.toString(); // Found a number (like reps)!
            
            if (Array.isArray(data)) {
                // If it's a list, unbox every item in the list and join with a comma
                return data.map(item => extractText(item)).join(', ');
            }
            
            if (typeof data === 'object' && data !== null) {
                // If it's a dictionary, pull out the values and put a space between them
                return Object.values(data).map(val => extractText(val)).join(' - ');
            }
            
            return "";
        }

        async function sendOrderToManager() {
            const resultBox = document.getElementById('result-box');
            const loadingText = document.getElementById('loading');
            
            // Reset UI
            resultBox.style.display = 'none';
            loadingText.style.display = 'block';

            const orderData = {
                user_name: document.getElementById('userName').value || "User",
                fitness_level: document.getElementById('userLevel').value,
                equipment_available: document.getElementById('userEquipment').value || "None",
                injuries: document.getElementById('userInjuries').value || "None"
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/generate-workout/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                const finalData = await response.json();
                loadingText.style.display = 'none'; 

                if (response.ok) {
                    resultBox.style.display = 'block';
                    const plan = finalData.data.generated_plan;
                    
                    let htmlContent = '<h2 class="success-title">🎯 Your 4-Week Blueprint</h2><div class="grid-container">';
                    
                    // Loop through the JSON object (week_1, week_2, etc.)
                    for (const [week, routine] of Object.entries(plan)) {
                        const cleanWeek = week.replace('_', ' '); 
                        
                        htmlContent += `<div class="week-card">
                                            <h3>📅 ${cleanWeek}</h3>
                                            <ul>`;
                        
                        // Use our Ultimate Unboxer on whatever the AI gave us
                        for (const [dayName, dayWorkout] of Object.entries(routine)) {
                            const workoutText = extractText(dayWorkout);

                            if (isNaN(dayName)) {
                                // Capitalize the day name properly
                                const capitalizedDay = dayName.charAt(0).toUpperCase() + dayName.slice(1);
                                htmlContent += `<li><strong>${capitalizedDay}:</strong> ${workoutText}</li>`;
                            } else {
                                htmlContent += `<li>${workoutText}</li>`;
                            }
                        }
                        
                        htmlContent += `</ul></div>`;
                    }
                    
                    htmlContent += '</div>'; 
                    resultBox.innerHTML = htmlContent;
                    
                } else {
                    resultBox.style.display = 'block';
                    resultBox.innerHTML = `<p style="color:red;">Error: ${finalData.detail}</p>`;
                }
            } catch (error) {
                loadingText.style.display = 'none';
                resultBox.style.display = 'block';
                resultBox.innerHTML = "<p style='color:red;'>Critical Error: Ensure your Python server is running!</p>";
            }
        }
    </script>
</body>
</html>
